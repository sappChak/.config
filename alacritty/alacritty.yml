
# Configuration for Alacritty, the GPU-accelerated terminal emulator

# Font configuration (Example uses a monospace font)
font:
  normal:
    family: 'JetBrainsMono Nerd Font'
    style: Regular
  bold:
    family: 'JetBrainsMono Nerd Font'
    style: Bold
  italic:
    family: 'JetBrainsMono Nerd Font'
    style: Italic
  bold_italic:
    family: 'JetBrainsMono Nerd Font'
    style: Bold Italic# Size of the font
  size: 14


# Enable or disable the use of dynamic titles
dynamic_title: false

# Enable or disable the use of the mouse
mouse:
  # If true, the mouse will be able to move the cursor
  # If false, the mouse will send button events to the terminal
  allow_scroll_wheel: true
  # Mouse mode, should be one of:
  # - `default`: Normal mode
  # - `override`: The mouse will always send scroll events to the terminal
  # - `force: The mouse will always send button events to the terminal
  #mode: default

window:
  dimensions:
    columns: 240
    lines: 100


# Colors
colors:
  # Default colors
  primary:
    background: '0x1e1e1e'
    foreground: '0xeeeeec'

  # Normal colors
  normal:
    black: '0x1e1e1e'
    red: '0xd54e53'
    green: '0xb9ca4a'
    yellow: '0xe7c547'
    blue: '0x7aa6da'
    magenta: '0xc397d8'
    cyan: '0x70c0b1'
    white: '0xeeeeec'

  # Bright colors
  bright:
    black: '0x666666'
    red: '0xf2777a'
    green: '0xa7e22e'
    yellow: '0xffcc66'
    blue: '0x6699cc'
    magenta: '0xb399cc'
    cyan: '0x66cccc'
    white: '0xf2f0ec'


# Scrollback buffer size in lines
scrollback: 1000

# Key bindings
key_bindings:
  # Copy and paste with Ctrl+Shift+C and Ctrl+Shift+V
  - { key: C, mods: Control | Shift, chars: "\x03" }
  - { key: V, mods: Control | Shift, chars: "\x16" }

shell:
  program: /usr/bin/zsh  # Set the path to your Zsh binary
  
