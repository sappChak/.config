import = [
    "~/.config/alacritty/themes/themes/dracula_plus.toml"
]

# Bright colors
[colors.bright]
black   = '0x4d4d4d'
red     = '0xff6c6b'
green   = '0x98be65'
yellow  = '0xecbe7b'
blue    = '0x51afef'
magenta = '0xc678dd'
cyan    = '0x46d9ff'
white   = '0xffffff'

[colors.cursor]
text = '0x000000'
cursor = '0xffffff'

[font]
size = 15

[font.normal]
# family = "JetBrainsMono Nerd Font"
# # family = "MonoLisa Nerd Font Mono"
# family = "Hack Nerd Font"
# family = "FiraCode Nerd Font"
family = "Monospace"
style = "Regular"

[[keyboard.bindings]]
chars = "\u0003"
key = "C"
mods = "Control | Shift"

[[keyboard.bindings]]
chars = "\u0016"
key = "V"
mods = "Control | Shift"

[shell]
program = "/usr/bin/zsh"

[window]
startup_mode = "Fullscreen"
decorations = "none"
dynamic_title = false
# opacity = 0.9

[debug]
log_level = "off"
